<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#311042" />
    </linearGradient>

    <!-- Accent Gradients -->
    <linearGradient id="accentCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.8" />
    </linearGradient>
    
    <linearGradient id="glowPurple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.5" stroke-opacity="0.3" />
    </pattern>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    /* CSS Animations for Dynamic Aspect */
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.9; }
    }
    @keyframes dash {
      to {
        stroke-dashoffset: -80;
      }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    .node-pulse {
      animation: pulse 3s infinite ease-in-out;
    }
    .node-pulse-delayed {
      animation: pulse 3s infinite ease-in-out;
      animation-delay: 1.5s;
    }
    .flow-line {
      stroke-dasharray: 20 10;
      animation: dash 4s linear infinite;
    }
    .banner-text {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-weight: 800;
      fill: #ffffff;
      filter: drop-shadow(0px 4px 12px rgba(192, 132, 252, 0.4));
    }
    .banner-subtext {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-weight: 500;
      fill: #94a3b8;
      letter-spacing: 0.15em;
    }
    .floating-group {
      animation: float 6s infinite ease-in-out;
    }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Abstract Policy Optimization Visualization -->
  <!-- Connecting Gradient Flows -->
  <path d="M -50 280 C 150 180, 250 350, 450 200 C 650 50, 850 320, 1250 150" fill="none" stroke="url(#accentCyan)" stroke-width="4" />
  <path class="flow-line" d="M -50 280 C 150 180, 250 350, 450 200 C 650 50, 850 320, 1250 150" fill="none" stroke="#22d3ee" stroke-width="1.5" />

  <path d="M -50 120 C 200 300, 400 80, 700 220 C 950 340, 1050 120, 1250 280" fill="none" stroke="url(#glowPurple)" stroke-width="3" opacity="0.4" />

  <!-- Nodes (Gradient Circles representing Neural Layer States) -->
  <g class="floating-group">
    <!-- Node 1 -->
    <circle cx="180" cy="140" r="45" fill="#1e1b4b" stroke="#818cf8" stroke-width="2" />
    <circle class="node-pulse" cx="180" cy="140" r="12" fill="#818cf8" filter="url(#glow)" />
    
    <!-- Node 2 -->
    <circle cx="480" cy="270" r="55" fill="#0f172a" stroke="#22d3ee" stroke-width="2" />
    <circle class="node-pulse-delayed" cx="480" cy="270" r="15" fill="#22d3ee" filter="url(#glow)" />

    <!-- Node 3 -->
    <circle cx="820" cy="130" r="35" fill="#1e1b4b" stroke="#c084fc" stroke-width="2" />
    <circle class="node-pulse" cx="820" cy="130" r="8" fill="#c084fc" filter="url(#glow)" />
  </g>

  <!-- Typography -->
  <text class="banner-text" x="50%" y="45%" dominant-baseline="middle" text-anchor="middle" font-size="52">POLICY GRADIENT METHODS</text>
  <text class="banner-subtext" x="50%" y="62%" dominant-baseline="middle" text-anchor="middle" font-size="18">HISTORY • PROGRESSION • VARIANTS • APPLICATIONS</text>

  <!-- Small Corner Accents -->
  <rect x="20" y="20" width="10" height="10" fill="none" stroke="#334155" stroke-width="2" />
  <line x1="20" y1="20" x2="40" y2="20" stroke="#334155" stroke-width="2" />
  <line x1="20" y1="20" x2="20" y2="40" stroke="#334155" stroke-width="2" />

  <rect x="1170" y="360" width="10" height="10" fill="none" stroke="#334155" stroke-width="2" />
  <line x1="1180" y1="380" x2="1160" y2="380" stroke="#334155" stroke-width="2" />
  <line x1="1180" y1="380" x2="1180" y2="360" stroke="#334155" stroke-width="2" />
</svg>
